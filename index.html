<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preparing Download...</title>

<style>
body {
  margin: 0;
  background: #000;
}

.video-container {
  position: relative;
  width: 100%;
  height: 100vh;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

#overlay-text {
  position: absolute;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.8);
  color: #000;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<div class="video-container">

  <video autoplay muted playsinline preload="autos">
    <source src="video.mp4" type="video/mp4">
  </video>

  <div id="overlay-text">Loading...</div>

</div>
<script>
// CPA LINKS
const offerMap = {
  en: "https://singingfiles.com/1794512",
  es: "https://singingfiles.com/1852640",
  pt: "https://filestrue.com/1852649",
  fr: "https://singingfiles.com/1852652",
  el: "https://singingfiles.com/1852659",
  ar: "https://singingfiles.com/1852666",
  ru: "https://singingfiles.com/1852671"
};

// TEXT TRANSLATIONS
const textMap = {
  en: "Must watch- redirecting in 15 seconds...
Steps to Download Tutorial"
  es: "Debe verlo — redirigiendo en 15 segundos...
Pasos para descargar el tutorial".
  pt: "Imperdível — redirecionando em 15 segundos...
Passos para baixar o tutorial",
  fr: "À regarder absolument — redirection dans 15 secondes...
Étapes pour télécharger le tutoriel"
  el: "Πρέπει να το δείτε — ανακατεύθυνση σε 15 δευτερόλεπτα...
Βήματα για λήψη του οδηγού",
  ar: "يجب المشاهدة — جارٍ إعادة التوجيه خلال 15 ثانية...
خطوات تنزيل الشرح",
  ru: "Обязательно к просмотру — перенаправление через 15 секунд...
Шаги для загрузки руководства"
};

// Detect language
const userLang = (navigator.language || 'en').slice(0,2);

// Select correct offer
const finalOffer = offerMap[userLang] || offerMap["en"];

// Show text
const overlay = document.getElementById("overlay-text");
overlay.innerText = textMap[userLang] || textMap["en"];

// Countdown
let timeLeft = 15;

const timer = setInterval(() => {
  timeLeft--;

  overlay.innerText = (textMap[userLang] || textMap["en"])
    .replace("15", timeLeft);

  if (timeLeft <= 0) {
    clearInterval(timer);
    window.location.href = finalOffer;
  }
}, 1000);
</script>

</body>
</html>
